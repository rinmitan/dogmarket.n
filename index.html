<header>

</header>

<div id="dogModal" class="modal">

  <div class="modal-content">

    <span id="close">&times;</span>

    <img id="dogImage" src="">

    <h2 id="dogName"></h2>

    <p id="dogSex"></p>

  <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}
</style>

</head>
<body>

<div class="container">

<h2>📨お問い合わせ</h2>

<form id="contact-form">

<input
type="text"
name="user_name"
placeholder="お名前"
required>

<input
type="email"
name="user_email"
placeholder="メールアドレス"
required>

<textarea
name="message"
rows="6"
placeholder="お問い合わせ内容"
required></textarea>

<button type="submit">
送信する
</button>

</form>

<p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
